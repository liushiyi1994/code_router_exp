run:
  name: phase2_exact_task_manifest
  output_dir: results/phase2
  random_seed: 7

data:
  source: llmrouterbench
  results_dir: data/raw/external/LLMRouterBench/results/bench
  cache_path: data/processed/llmrouterbench_pilot/outcomes.csv
  source_splits: null
  datasets:
    - aime
    - math500
  domain_map:
    aime: math
    math500: math
  models:
    - Qwen3-8B
    - Qwen2.5-Coder-7B-Instruct
    - DeepSeek-R1-Distill-Qwen-7B
    - Llama-3.1-8B-Instruct
    - MiniCPM4.1-8B
    - Intern-S1-mini
  drop_incomplete_queries: true
  hashing_features: 256

utility:
  lambda_cost: 0.0

split:
  train_frac: 0.60
  val_frac: 0.20
  test_frac: 0.20

phase2_exact_task_manifest:
  datasets:
    - aime
    - math500
  split: test
  max_queries: 200
