checked_date: 2026-06-17
defaults:
  local_backend: vllm
  local_remote_cost_usd: 0.0
  run_local_models_sequentially: true
  latency_policy: generation_latency_excludes_model_load_and_warmup
  openai_compatible_path: /v1/chat/completions
local_models:
  - id: qwen3-0.6b-probe
    served_model_name: Qwen/Qwen3-0.6B
    role: cheap_probe
    backend: vllm
    load_mode: lazy
    start_command: scripts/start_vllm_qwen3_0_6b.sh
    stop_command: scripts/stop_vllm_port.sh 8001
    base_url: http://localhost:8001/v1
    enabled: true
    fallback_mode: controlled_surrogate
  - id: qwen3-4b-local
    served_model_name: Qwen/Qwen3-4B
